<tr>
    <td><code title="{{.ID}}">{{shortID .ID}}</code></td>
    <td>{{.Name}}</td>
    <td>{{formatDate .Date}}</td>
    <td>
        <span class="status-indicator status-{{.Status}}">{{statusLabel .Status}}</span>
    </td>
    <td class="actions">
        {{ if eq .Status "ok" }}
            <a href="/download?id={{.ID}}" class="btn btn-small btn-download">Baixar CSV</a>
        {{ end }}
        <button
            type="button"
            hx-delete="/delete?id={{.ID}}"
            hx-target="closest tr"
            hx-swap="outerHTML"
            hx-confirm="Excluir este job e o CSV?"
            class="btn btn-small btn-danger">Excluir</button>
    </td>
</tr>
